<!DOCTYPE html>
<html lang="pt-PT">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="IdentityHub Pro — One Tap. Infinite Connections."
  >

  <meta
    name="theme-color"
    content="#05070a"
  >

  <title>IdentityHub Pro</title>

  <link
    rel="icon"
    type="image/svg+xml"
    href="./favicon.svg"
  >

  <link
  rel="manifest"
  href="./manifest.json"
>

<link
  rel="apple-touch-icon"
  href="./assets/icons/apple-touch-icon.png"
>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="./css/style.css"
  >
</head>

<body>
  <div
    class="background"
    aria-hidden="true"
  ></div>

  <main class="app-shell">
    <article
      class="card"
      id="profile-card"
    >
      <div
        class="light-reflection"
        aria-hidden="true"
      ></div>

      <div class="avatar-wrapper">
        <div
          class="avatar-ring"
          aria-hidden="true"
        ></div>

        <img
          src="./assets/images/profile.jpg"
          alt="Fotografia de perfil de Hugo Rodrigues"
          class="avatar"
          id="profile-avatar"
        >
      </div>

      <div class="profile-content">
        <h1
          class="profile-name"
          id="profile-name"
        >
          Hugo Rodrigues
        </h1>

        <p
          class="profile-tagline"
          id="profile-tagline"
        >
          One Tap. Infinite Connections.
        </p>

        <div class="profile-meta">
          <span
            class="profile-job"
            id="profile-job"
          >
            Store Manager
          </span>

          <span
            class="profile-meta-dot"
            aria-hidden="true"
          ></span>

          <span
            class="profile-location"
            id="profile-location"
          >
            Portugal
          </span>
        </div>
      </div>

      <nav
        class="contact-actions"
        id="contact-actions"
        aria-label="Contactos e redes sociais"
      ></nav>
      <section class="qr-section" aria-labelledby="qr-title">
  <div class="section-divider" aria-hidden="true"></div>

  <div class="qr-heading">
    <span class="qr-eyebrow">Ligação rápida</span>

    <h2 id="qr-title">
      Digitaliza para guardar
    </h2>
  </div>

  <div class="qr-frame">
    <div
      class="qr-code"
      id="qr-code"
      aria-label="QR Code do cartão digital"
    ></div>

    <div class="qr-logo" aria-hidden="true">
      <svg viewBox="0 0 64 64">
        <circle
          cx="32"
          cy="32"
          r="21"
          fill="none"
          stroke="currentColor"
          stroke-width="5"
        />

        <circle
          cx="32"
          cy="25"
          r="7"
          fill="currentColor"
        />

        <path
          d="M18 47c2-9 8-13 14-13s12 4 14 13"
          fill="none"
          stroke="currentColor"
          stroke-width="5"
          stroke-linecap="round"
        />
      </svg>
    </div>
  </div>

  <p class="qr-description">
    Aponta a câmara para abrir o cartão digital.
  </p>

 <div class="profile-buttons">
  <!-- Guardar contacto -->
  <button
    class="profile-button profile-button--primary"
    id="save-contact-button"
    type="button"
  >
    <span class="profile-button__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <circle cx="9" cy="8" r="3"></circle>
        <path d="M3.5 19c.7-4 2.7-6 5.5-6s4.8 2 5.5 6"></path>
        <path d="M18 8v6"></path>
        <path d="M15 11h6"></path>
      </svg>
    </span>

    <span>Guardar contacto</span>
  </button>

  <!-- Partilhar -->
  <button
    class="profile-button profile-button--secondary"
    id="share-button"
    type="button"
  >
    <span class="profile-button__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <circle cx="18" cy="5" r="2.5"></circle>
        <circle cx="6" cy="12" r="2.5"></circle>
        <circle cx="18" cy="19" r="2.5"></circle>
        <path d="m8.3 10.8 7.4-4.4"></path>
        <path d="m8.3 13.2 7.4 4.4"></path>
      </svg>
    </span>

    <span>Partilhar</span>
  </button>

  <!-- Instalar aplicação -->
  <button
    class="profile-button profile-button--install"
    id="install-app-button"
    type="button"
    hidden
  >
    <span class="profile-button__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M12 3v12"></path>
        <path d="m7 10 5 5 5-5"></path>
        <path d="M5 19h14"></path>
      </svg>
    </span>

    <span>Instalar aplicação</span>
  </button>
</div>
</section>

<div
  class="toast"
  id="toast"
  role="status"
  aria-live="polite"
  aria-atomic="true"
></div>
    </article>
  </main>

  <script
  src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"
></script>

<script
  type="module"
  src="./js/app.js"
></script>
</body>

</html>
